<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F5FF;--surface:#fff;--border:rgba(99,102,241,.14);
  --indigo:#6366F1;--indigo2:#4F46E5;--cyan:#22D3EE;--green:#10B981;
  --text:#0F0E2A;--muted:#6B6A8A;--muted2:#A8A7BF;
  --agent-color:#6366F1;--agent-bg:rgba(99,102,241,.08);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* HEADER */
.header{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;position:relative}
.agent-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative}
.avatar-pulse{position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:var(--green);border-radius:50%;border:2px solid var(--surface)}
.agent-info{flex:1;min-width:0}
.agent-name-header{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-status{font-size:11px;color:var(--green);font-weight:500}
.header-actions{display:flex;align-items:center;gap:8px}
.btn-icon{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;color:var(--muted);text-decoration:none}
.btn-icon:hover{background:rgba(99,102,241,.06);color:var(--indigo)}
.typing-indicator{display:none;align-items:center;gap:6px;padding:0 16px;font-size:12px;color:var(--muted);height:24px;flex-shrink:0}
.typing-dot{width:5px;height:5px;background:var(--muted2);border-radius:50%;animation:typing .8s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typing{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.1);opacity:1}}

/* CHAT AREA */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* WELCOME */
.welcome{text-align:center;padding:32px 20px;max-width:460px;margin:auto}
.welcome-avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.welcome-pulse{position:absolute;inset:-4px;border-radius:50%;border:2px solid;opacity:.3;animation:pulse-ring 2s ease-out infinite}
@keyframes pulse-ring{0%{transform:scale(.95);opacity:.5}100%{transform:scale(1.1);opacity:0}}
.welcome h2{font-family:'Space Grotesk',sans-serif;font-size:22px;margin-bottom:6px}
.welcome p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:20px}
.suggestions{display:flex;flex-direction:column;gap:8px;text-align:left}
.sug{padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text);cursor:pointer;transition:.15s;line-height:1.4}
.sug:hover{border-color:var(--agent-color);background:var(--agent-bg)}

/* MESSAGES */
.msg-wrap{display:flex;gap:10px;max-width:82%;animation:msg-in .2s ease-out}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-wrap.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.msg-avatar.agent-av{background:var(--agent-bg);border:1px solid var(--border)}
.msg-avatar.user-av{background:rgba(99,102,241,.1)}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.65;max-width:100%;word-wrap:break-word}
.msg-bubble.agent{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.msg-bubble.user{background:var(--indigo);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:10px;color:var(--muted2);margin-top:4px;text-align:right}
.msg-wrap.user .msg-time{text-align:left}
.system-msg{text-align:center;font-size:11px;color:var(--muted2);padding:4px 0}

/* INPUT AREA */
.input-area{background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-box{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);resize:none;min-height:44px;max-height:120px;outline:none;transition:.2s;line-height:1.5}
.input-box::placeholder{color:var(--muted2)}
.input-box:focus{border-color:var(--agent-color)}
.btn-send{width:42px;height:42px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.2s;flex-shrink:0}
.btn-send:hover{transform:scale(1.05)}
.btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none}
.input-hint{font-size:11px;color:var(--muted2);margin-top:6px;text-align:center}

/* SIDEBAR DE HISTÓRICO */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--surface);border-right:1px solid var(--border);z-index:50;transform:translateX(-100%);transition:.25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.1)}
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49;display:none}
.sb-overlay.open{display:block}
.sb-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
.sb-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
.sb-list{flex:1;overflow-y:auto;padding:8px}
.sb-item{padding:10px 12px;border-radius:8px;cursor:pointer;transition:.15s;margin-bottom:4px}
.sb-item:hover{background:var(--bg)}
.sb-item.active{background:var(--agent-bg);border:1px solid var(--agent-color)}
.sb-item-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item-date{font-size:11px;color:var(--muted);margin-top:2px}
.sb-new{margin:8px;padding:10px;background:var(--agent-color);color:#fff;border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;cursor:pointer;width:calc(100% - 16px);transition:.2s}
.sb-new:hover{background:var(--indigo2)}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--surface);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.load-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;animation:pop .5s ease-out}
@keyframes pop{from{transform:scale(0.6);opacity:0}to{transform:scale(1);opacity:1}}
.load-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.load-sub{font-size:13px;color:var(--muted)}
.load-bar{width:160px;height:3px;background:var(--border);border-radius:100px;overflow:hidden;margin-top:4px}
.load-progress{height:100%;border-radius:100px;animation:loading 1.5s ease-in-out infinite}
@keyframes loading{0%{width:0%}100%{width:100%}}

/* NOT FOUND */
#not-found{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:20px}
#not-found .icon{font-size:56px}
#not-found h2{font-family:'Space Grotesk',sans-serif;font-size:22px}
#not-found p{font-size:14px;color:var(--muted);max-width:320px;line-height:1.7}

@media(min-width:600px){.chat-area{padding:20px 10%;}.msg-wrap{max-width:70%}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="load-avatar" id="load-av" style="background:rgba(99,102,241,.1)">🤖</div>
  <div class="load-name" id="load-name">Carregando...</div>
  <div class="load-sub" id="load-sub">Preparando seu agente</div>

</div>

<!-- NOT FOUND -->
<div id="not-found">
  <div class="icon">🔍</div>
  <h2>Agente não encontrado</h2>
  <p>Este agente não existe ou ainda não foi ativado. Verifique o link enviado pela equipe AcadêmicoFácil.</p>
  <a href="/agentes" style="margin-top:8px;padding:12px 24px;background:linear-gradient(135deg,#6366F1,#4F46E5);color:#fff;border-radius:100px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;text-decoration:none">Ver agentes disponíveis</a>

<!-- SIDEBAR HISTÓRICO -->
<div class="sb-overlay" id="sb-overlay" onclick="fecharSb()"></div>
<div class="sidebar" id="sidebar">

    <span class="sb-title">Histórico</span>
    <button class="sb-close" onclick="fecharSb()">✕</button>
  </div>

</div>

<!-- HEADER -->
<div class="header" id="main-header" style="display:none">
  <div class="agent-avatar" id="header-avatar" style="background:rgba(99,102,241,.1)">
    <span id="header-avatar-icon">🤖</span>
    <div class="avatar-pulse"></div>
  </div>
  <div class="agent-info">
    <div class="agent-name-header" id="header-name">Agente</div>
    <div class="agent-status" id="header-status">● Online</div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="abrirSb()" title="Histórico">📋</button>

  </div>
</div>

<!-- TYPING -->
<div class="typing-indicator" id="typing">
  <span id="typing-name">Agente</span> está digitando
  <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
</div>

<!-- CHAT -->
<div class="chat-area" id="chat-area" style="display:none"></div>

<!-- INPUT -->
<div class="input-area" id="input-area" style="display:none">
  <div class="input-row">
    <textarea class="input-box" id="msg-input" placeholder="Digite sua mensagem..." rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button class="btn-send" id="btn-send" onclick="enviarMsg()"
      style="background:linear-gradient(135deg,var(--agent-color),var(--indigo2));color:#fff">
      ➤
    </button>
  </div>
  <div class="input-hint">Enter para enviar · Shift+Enter para nova linha</div>
</div>

<script>
// ============ CONFIG ============
let AGENTE = {
  nome: '',
  tipo: 'edu',
  emoji: '🤖',
  cor: '#6366F1',
  corBg: 'rgba(99,102,241,.1)',
  gradiente: 'linear-gradient(135deg,#6366F1,#22D3EE)',
  perfil: '',
  ativo: false,
  requestId: null
};

let historico = [];      // { role, content } para a API
let conversaId = null;
let enviando = false;

// ============ INIT ============
async function init() {
  // Ler nome do agente da URL: /agente/sofia → nome = sofia
  const path = window.location.pathname;
  const nomeUrl = path.split('/agente/')[1]?.toLowerCase().trim();

  if(!nomeUrl) { mostrarNotFound(); return; }

  try {
    // Buscar agente no Firestore por nomeAgente (case-insensitive via lower)
    const snap = await db.collection('agent_requests')
      .where('status', '==', 'ativo')
      .get();

    let agentData = null;
    snap.forEach(doc => {
      const d = doc.data();
      if(d.nomeAgente?.toLowerCase().trim() === nomeUrl) {
        agentData = { id: doc.id, ...d };
      }
    });

    if(!agentData) { mostrarNotFound(); return; }

    // Configurar agente
    AGENTE.nome       = agentData.nomeAgente;
    AGENTE.tipo       = agentData.tipo || 'edu';
    AGENTE.requestId  = agentData.id;
    AGENTE.perfil     = montarPerfil(agentData);
    AGENTE.ativo      = true;

    // Identidade visual por tipo
    if(AGENTE.tipo === 'corp') {
      AGENTE.emoji     = '💼';
      AGENTE.cor       = '#059669';
      AGENTE.corBg     = 'rgba(5,150,105,.1)';
      AGENTE.gradiente = 'linear-gradient(135deg,#059669,#22D3EE)';
    } else if(AGENTE.tipo === 'combo') {
      AGENTE.emoji     = '⚡';
      AGENTE.cor       = '#6366F1';
      AGENTE.gradiente = 'linear-gradient(135deg,#6366F1,#059669)';
    } else {
      AGENTE.emoji     = '🎓';
    }

    aplicarTema();
    ativarInterface(agentData);

  } catch(e) {
    console.error(e);
    mostrarNotFound();
  }
}

function montarPerfil(d) {
  const linhas = [
    `Nome do agente: ${d.nomeAgente}`,
    `Tipo: ${d.tipo === 'edu' ? 'Educacional' : d.tipo === 'corp' ? 'Corporativo' : 'Combo'}`,
    d.area        ? `Área/Curso: ${d.area}` : '',
    d.cargo       ? `Cargo: ${d.cargo}` : '',
    d.empresa     ? `Empresa: ${d.empresa}` : '',
    d.nivel       ? `Nível acadêmico: ${d.nivel}` : '',
    d.instituicao ? `Instituição: ${d.instituicao}` : '',
    d.tema        ? `Tema atual: ${d.tema}` : '',
    d.tarefas     ? `Tarefas configuradas: ${d.tarefas}` : '',
    d.tom         ? `Tom de comunicação: ${d.tom}` : '',
    d.observacoes ? `Observações: ${d.observacoes}` : '',
  ].filter(Boolean);
  return linhas.join('\n');
}

function aplicarTema() {
  document.documentElement.style.setProperty('--agent-color', AGENTE.cor);
  document.documentElement.style.setProperty('--agent-bg', AGENTE.corBg);
}

function ativarInterface(agentData) {
  // Título da página
  document.getElementById('page-title').textContent = `${AGENTE.nome} — AcadêmicoFácil`;

  // Header
  document.getElementById('header-avatar-icon').textContent = AGENTE.emoji;
  document.getElementById('header-avatar').style.background = AGENTE.corBg;
  document.getElementById('header-name').textContent = AGENTE.nome;
  document.getElementById('header-status').textContent = '● Online';
  document.getElementById('typing-name').textContent = AGENTE.nome;

  // Loading → Interface
  const loading = document.getElementById('loading-screen');
  loading.style.opacity = '0';
  loading.style.transition = 'opacity .4s';
  setTimeout(() => {
    loading.style.display = 'none';
    document.getElementById('main-header').style.display = 'flex';
    document.getElementById('chat-area').style.display = 'flex';
    document.getElementById('input-area').style.display = 'block';
    mostrarBemVindo(agentData);
  }, 400);
}

function mostrarBemVindo(d) {
  const tipo = AGENTE.tipo;
  const sugestoes = tipo === 'corp' ? [
    `📧 Redigir um e-mail profissional para um cliente`,
    `📊 Resumir os pontos principais de uma reunião`,
    `📋 Criar um checklist de tarefas para esta semana`,
  ] : [
    `📝 Revisar um trecho do meu texto acadêmico`,
    `📐 Como formatar uma citação direta em ABNT?`,
    `🎤 Me ajudar a me preparar para a defesa`,
  ];

  const welcome = document.createElement('div');
  welcome.className = 'welcome';
  welcome.innerHTML = `
    <div class="welcome-avatar" style="background:${AGENTE.corBg}">
      <div class="welcome-pulse" style="border-color:${AGENTE.cor}"></div>
      <span style="font-size:36px">${AGENTE.emoji}</span>
    </div>
    <h2>Olá! Sou ${AGENTE.nome} 👋</h2>
    <p>Estou aqui para te ajudar${tipo === 'corp' ? ' com suas demandas profissionais' : ' na sua jornada acadêmica'}. O que você precisa hoje?</p>
    <div class="suggestions">
      ${sugestoes.map(s => `<div class="sug" onclick="usarSugestao('${s.replace(/'/g, "\\'")}')">${s}</div>`).join('')}
    </div>`;
  document.getElementById('chat-area').appendChild(welcome);
  carregarHistorico();
}

// ============ MENSAGENS ============
function addMensagem(role, texto, salvar = true) {
  const chat = document.getElementById('chat-area');

  // Remove welcome se existir
  const welcome = chat.querySelector('.welcome');
  if(welcome) welcome.remove();

  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role === 'user' ? 'user' : ''}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role === 'user' ? 'user-av' : 'agent-av'}`;
  avatar.textContent = role === 'user' ? '👤' : AGENTE.emoji;
  if(role !== 'user') avatar.style.background = AGENTE.corBg;

  const bubble = document.createElement('div');
  bubble.className = `msg-bubble ${role === 'user' ? 'user' : 'agent'}`;
  bubble.style.borderColor = role !== 'user' ? 'var(--border)' : '';

  // Formatar markdown básico
  bubble.innerHTML = formatarTexto(texto);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});

  const inner = document.createElement('div');
  inner.appendChild(bubble);
  inner.appendChild(time);

  wrap.appendChild(avatar);
  wrap.appendChild(inner);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;

  if(salvar) {
    historico.push({ role: role === 'user' ? 'user' : 'assistant', content: texto });
    salvarConversa();
  }
}

function formatarTexto(txt) {
  return txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code style="background:rgba(99,102,241,.08);padding:1px 5px;border-radius:3px;font-size:12px">$1</code>')
    .replace(/\n/g,'<br>');
}

// ============ ENVIAR ============
async function enviarMsg() {
  if(enviando) return;
  const input = document.getElementById('msg-input');
  const texto = input.value.trim();
  if(!texto) return;

  input.value = '';
  autoResize(input);
  enviando = true;
  document.getElementById('btn-send').disabled = true;

  addMensagem('user', texto);
  mostrarTyping(true);

  try {
    let idToken = null;
    try { idToken = await auth.currentUser?.getIdToken(true); } catch {}

    const apiResp = await fetch('/api/ia-academica', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(idToken ? { 'Authorization': 'Bearer ' + idToken } : {})
      },
      body: JSON.stringify({
        action: 'conversa',
        agentName: AGENTE.nome,
        agentType: AGENTE.tipo,
        mensagem: texto,
        historico: historico.slice(-8).map(h => ({ role: h.role, content: h.content })),
        orderId: AGENTE.requestId,
        order: { requirements: AGENTE.perfil }
      })
    });

    const data = await apiResp.json();
    mostrarTyping(false);

    let resposta = '';
    if(data.ok && data.content) {
      resposta = data.content;
    } else if(data.summary) {
      resposta = data.summary;
    } else {
      resposta = `Desculpe, tive um problema ao processar sua mensagem. Tente novamente!`;
    }

    addMensagem('agent', resposta);

  } catch(e) {
    mostrarTyping(false);
    addMensagem('agent', `Ops! Tive um problema de conexão. Verifique sua internet e tente novamente.`);
    console.error(e);
  } finally {
    enviando = false;
    document.getElementById('btn-send').disabled = false;
  }
}

// System prompt gerenciado pela Edge Function /api/ia-academica

// ============ UI ============
function mostrarTyping(show) {
  const el = document.getElementById('typing');
  el.style.display = show ? 'flex' : 'none';
}

function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMsg(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function usarSugestao(texto) {
  document.getElementById('msg-input').value = texto.replace(/^[^\s]+\s/, '');
  enviarMsg();
}

// ============ HISTÓRICO ============
function salvarConversa() {
  if(!conversaId) conversaId = 'conv-' + Date.now();
  const convs = JSON.parse(localStorage.getItem('af-convs-' + AGENTE.nome) || '[]');
  const idx = convs.findIndex(c => c.id === conversaId);
  const item = { id: conversaId, titulo: historico[0]?.content?.slice(0,40) || 'Nova conversa', msgs: historico, ts: Date.now() };
  if(idx >= 0) convs[idx] = item; else convs.unshift(item);
  localStorage.setItem('af-convs-' + AGENTE.nome, JSON.stringify(convs.slice(0, 20)));
  renderSidebar();
}

function carregarHistorico() {
  renderSidebar();
}

function renderSidebar() {
  const convs = JSON.parse(localStorage.getItem('af-convs-' + AGENTE.nome) || '[]');
  const list = document.getElementById('sb-list');
  if(!convs.length) { list.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:12px">Nenhuma conversa ainda</p>'; return; }
  list.innerHTML = convs.map(c => `
    <div class="sb-item ${c.id === conversaId ? 'active' : ''}" onclick="carregarConversa('${c.id}')">
      <div class="sb-item-title">${c.titulo}</div>
      <div class="sb-item-date">${new Date(c.ts).toLocaleDateString('pt-BR')}</div>
    </div>`).join('');
}

function carregarConversa(id) {
  const convs = JSON.parse(localStorage.getItem('af-convs-' + AGENTE.nome) || '[]');
  const conv = convs.find(c => c.id === id);
  if(!conv) return;
  conversaId = id;
  historico = conv.msgs;
  const chat = document.getElementById('chat-area');
  chat.innerHTML = '';
  historico.forEach(m => addMensagem(m.role === 'user' ? 'user' : 'agent', m.content, false));
  fecharSb();
}

function novaConversa() {
  conversaId = null;
  historico = [];
  const chat = document.getElementById('chat-area');
  chat.innerHTML = '';
  mostrarBemVindo({});
  fecharSb();
}

function abrirSb()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sb-overlay').classList.add('open'); }
function fecharSb() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sb-overlay').classList.remove('open'); }

// ============ NOT FOUND ============
function mostrarNotFound() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('not-found').style.display = 'flex';
}

// ============ START ============
document.addEventListener('DOMContentLoaded', () => {
  // Animação de loading
  setTimeout(() => {
    document.getElementById('load-sub').textContent = 'Buscando seu agente...';
    init();
  }, 800);
});
</script>
