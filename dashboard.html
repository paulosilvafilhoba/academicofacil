<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadêmicoFácil — Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: #1e293b; border-right: 1px solid #334155; padding: 20px; overflow-y: auto; }
    .content { flex: 1; padding: 30px; overflow-y: auto; }
    .nav-item { 
      padding: 12px 16px; margin: 8px 0; border-radius: 8px; cursor: pointer;
      background: rgba(255,255,255,0.05); transition: all 0.2s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.1); }
    .nav-item.active { background: #3b82f6; color: white; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; }
    button { 
      padding: 10px 16px; background: #3b82f6; color: white; border: none; 
      border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s;
    }
    button:hover { background: #2563eb; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button:disabled { background: #475569; cursor: not-allowed; }
    input, textarea, select { 
      width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155;
      border-radius: 6px; color: #e2e8f0; margin: 8px 0; font-family: inherit;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .stat { background: #1e293b; padding: 15px; border-radius: 8px; border-left: 4px solid #3b82f6; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 12px; color: #94a3b8; margin-top: 5px; }
    .cupom-item {
      background: #0f172a; padding: 12px; border-radius: 6px; border: 1px solid #334155;
      display: flex; justify-content: space-between; align-items: center; margin: 8px 0;
    }
    .cupom-code { font-weight: 600; font-size: 14px; }
    .cupom-desc { font-size: 12px; color: #94a3b8; }
    .toggle { width: 40px; height: 24px; background: #334155; border-radius: 12px; cursor: pointer; position: relative; }
    .toggle.active { background: #10b981; }
    .toggle span { position: absolute; width: 20px; height: 20px; background: white; border-radius: 10px; top: 2px; left: 2px; transition: all 0.2s; }
    .toggle.active span { left: 18px; }
    .hidden { display: none; }
    .error { color: #fca5a5; }
    .success { color: #86efac; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .modal-content { background: #1e293b; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .form-group { margin: 15px 0; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 12px; }
    .pedido-item {
      background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; margin: 10px 0;
    }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 15px 20px; border-radius: 6px; z-index: 9999; }
    .toast.error { background: #dc2626; }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <div style="font-weight: 700; font-size: 18px; margin-bottom: 30px;">🎓 AcadêmicoFácil</div>
    
    <div id="nav-admin" class="hidden">
      <div class="nav-item" onclick="showPanel('admin-dash')">📊 Dashboard</div>
      <div class="nav-item" onclick="showPanel('admin-cupons')">🎟️ Cupons</div>
      <div class="nav-item" onclick="showPanel('admin-pedidos')">📋 Pedidos</div>
    </div>
    
    <div id="nav-cliente" class="hidden">
      <div class="nav-item" onclick="showPanel('cliente-novo')">✏️ Novo Pedido</div>
      <div class="nav-item" onclick="showPanel('cliente-meus')">📋 Meus Pedidos</div>
    </div>
    
    <div class="nav-item" onclick="logout()" style="margin-top: 30px; background: rgba(220,38,38,0.1);">🚪 Sair</div>
  </div>

  <div class="content">
    <div id="panel-admin-dash" class="hidden">
      <h2>📊 Dashboard</h2>
      <div class="grid">
        <div class="stat">
          <div class="stat-label">Pedidos</div>
          <div class="stat-value" id="stat-pedidos">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Receita</div>
          <div class="stat-value" id="stat-receita">R$ 0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Cupons</div>
          <div class="stat-value" id="stat-cupons">0</div>
        </div>
      </div>
    </div>

    <div id="panel-admin-cupons" class="hidden">
      <div class="card">
        <div class="card-title">🎟️ Gerenciar Cupons</div>
        <button onclick="abrirModalCupom()">+ Novo Cupom</button>
        <div id="cupons-lista" style="margin-top: 20px;"></div>
      </div>
    </div>

    <div id="panel-admin-pedidos" class="hidden">
      <div class="card">
        <div class="card-title">📋 Pedidos</div>
        <div id="pedidos-lista"></div>
      </div>
    </div>

    <div id="panel-cliente-novo" class="hidden">
      <div class="card">
        <div class="card-title">✏️ Novo Pedido</div>
        
        <div class="form-group">
          <label>Tipo</label>
          <select id="select-servico" onchange="calcularValor()">
            <option value="">Selecione...</option>
            <option value="tecnico">TCC Técnico (R$25/lauda)</option>
            <option value="graduacao">TCC Graduação (R$35/lauda)</option>
            <option value="pos">Pós/MBA (R$55/lauda)</option>
            <option value="artigo">Artigo (R$480)</option>
            <option value="formatacao">Formatação (R$12/lauda)</option>
            <option value="revisao">Revisão (R$180)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Laudas</label>
          <input id="input-laudas" type="number" placeholder="Ex: 10" onchange="calcularValor()">
        </div>

        <div class="form-group">
          <label>Tema</label>
          <input id="input-tema" placeholder="Tema do trabalho">
        </div>

        <div class="form-group">
          <label>Descrição</label>
          <textarea id="input-desc" placeholder="Detalhes" style="height: 80px;"></textarea>
        </div>

        <div class="form-group">
          <label>Cupom</label>
          <input id="input-cupom" placeholder="Cupom" style="text-transform: uppercase;" onchange="aplicarCupom()">
          <small id="cupom-msg" style="color: #94a3b8;"></small>
        </div>

        <div style="background: #0f172a; padding: 15px; border-radius: 8px; margin: 15px 0;">
          <div style="display: flex; justify-content: space-between;">
            <span>Base:</span>
            <span id="valor-base">R$ 0</span>
          </div>
          <div id="desconto-display" style="display: none; display: flex; justify-content: space-between; color: #10b981; margin: 10px 0;">
            <span>Desconto:</span>
            <span id="valor-desconto">- R$ 0</span>
          </div>
          <div style="border-top: 1px solid #334155; padding-top: 10px; display: flex; justify-content: space-between; font-weight: 700;">
            <span>Total:</span>
            <span id="valor-total">R$ 0</span>
          </div>
        </div>

        <button onclick="abrirModalPagamento()" style="width: 100%;">Continuar →</button>
      </div>
    </div>

    <div id="panel-cliente-meus" class="hidden">
      <div class="card">
        <div class="card-title">📋 Meus Pedidos</div>
        <div id="meus-pedidos-lista"></div>
      </div>
    </div>
  </div>
</div>

<div id="modal-cupom" class="hidden modal">
  <div class="modal-content">
    <h3>Novo Cupom</h3>
    <input id="input-codigo" placeholder="Código" style="text-transform: uppercase; margin-top: 15px;">
    <input id="input-desconto" type="number" placeholder="Desconto %" min="0" max="100">
    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button onclick="salvarCupom()" style="flex: 1;">Salvar</button>
      <button onclick="fecharModal('modal-cupom')" style="flex: 1; background: #334155;">Cancelar</button>
    </div>
  </div>
</div>

<div id="modal-pagamento" class="hidden modal">
  <div class="modal-content">
    <h3>Resumo do Pedido</h3>
    <div style="background: #0f172a; padding: 15px; border-radius: 8px; margin: 15px 0;">
      <div><strong id="resumo-servico">-</strong></div>
      <div style="font-size: 12px; color: #94a3b8; margin-top: 10px;" id="resumo-tema">-</div>
      <div style="border-top: 1px solid #334155; margin-top: 10px; padding-top: 10px; display: flex; justify-content: space-between; font-weight: 700;">
        <span>Total:</span>
        <span id="resumo-total">R$ 0</span>
      </div>
    </div>

    <label style="display: flex; align-items: center; gap: 8px; margin: 15px 0;">
      <input type="radio" name="metodo-pag" value="cartao" checked>
      💳 Cartão (Mercado Pago)
    </label>

    <label style="display: flex; align-items: center; gap: 8px; margin: 15px 0;">
      <input type="radio" name="metodo-pag" value="teste">
      🧪 Teste
    </label>

    <button id="btn-pagar" onclick="processarPagamento()" style="width: 100%;">Pagar →</button>
    <button onclick="fecharModal('modal-pagamento')" style="width: 100%; margin-top: 10px; background: #334155;">Cancelar</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAr8wl8rH_P0n6fEDhOVuqBif7YeTWmgsA",
  projectId: "academicofacil-87df6",
  storageBucket: "academicofacil-87df6.appspot.com",
  messagingSenderId: "397788835186",
  appId: "1:397788835186:web:8f6c2649bdf7a2dd0fbc6c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let usuarioAdmin = false;
let pendingOrder = null;
let cupomAplicado = null;

const PRECOS = {
  'tecnico': 25,
  'graduacao': 35,
  'pos': 55,
  'artigo': 480,
  'formatacao': 12,
  'revisao': 180
};

const TIPO_FIXO = { 'artigo': true, 'revisao': true };

auth.onAuthStateChanged(async user => {
  if (!user) {
    window.location.href = '/';
    return;
  }
  
  currentUser = user;
  const docUser = await db.collection('users').doc(user.uid).get();
  usuarioAdmin = docUser.exists && docUser.data().admin;
  
  if (usuarioAdmin) {
    document.getElementById('nav-admin').classList.remove('hidden');
    showPanel('admin-dash');
    carregarDadosAdmin();
  } else {
    document.getElementById('nav-cliente').classList.remove('hidden');
    showPanel('cliente-novo');
  }
});

function showPanel(id) {
  document.querySelectorAll('[id^="panel-"]').forEach(p => p.classList.add('hidden'));
  document.getElementById('panel-' + id).classList.remove('hidden');
  
  if (id === 'admin-cupons') carregarCupons();
  if (id === 'admin-pedidos') carregarPedidosAdmin();
  if (id === 'cliente-meus') carregarMeusPedidos();
}

async function carregarDadosAdmin() {
  const pedidos = await db.collection('orders').get();
  document.getElementById('stat-pedidos').textContent = pedidos.size;
  
  let total = 0;
  pedidos.forEach(doc => total += (doc.data().valor || 0));
  document.getElementById('stat-receita').textContent = 'R$ ' + total.toFixed(2);
  
  const cupons = await db.collection('PROMOCOES').get();
  const ativos = cupons.docs.filter(d => d.data().active).length;
  document.getElementById('stat-cupons').textContent = ativos;
}

async function carregarCupons() {
  const snap = await db.collection('PROMOCOES').get();
  let html = '';
  snap.forEach(doc => {
    const d = doc.data();
    html += `<div class="cupom-item">
      <div>
        <div class="cupom-code">${d.code}</div>
        <div class="cupom-desc">${d.discount}%</div>
      </div>
      <div style="display: flex; gap: 10px;">
        <div class="toggle ${d.active ? 'active' : ''}" onclick="toggleCupom('${doc.id}', ${!d.active})"><span></span></div>
        <button class="danger" onclick="deletarCupom('${doc.id}')" style="padding: 6px 10px; font-size: 11px;">Delete</button>
      </div>
    </div>`;
  });
  document.getElementById('cupons-lista').innerHTML = html || '<p class="error">Nenhum</p>';
}

async function carregarPedidosAdmin() {
  const snap = await db.collection('orders').orderBy('createdAt', 'desc').limit(20).get();
  let html = '';
  snap.forEach(doc => {
    const d = doc.data();
    html += `<div class="pedido-item"><strong>${d.servico}</strong> - #${doc.id.substring(0, 8).toUpperCase()}<div style="font-size: 11px; color: #94a3b8; margin-top: 5px;">R$ ${d.valor} | ${d.status}</div></div>`;
  });
  document.getElementById('pedidos-lista').innerHTML = html || '<p>-</p>';
}

function abrirModalCupom() {
  document.getElementById('modal-cupom').classList.remove('hidden');
}

async function salvarCupom() {
  const codigo = document.getElementById('input-codigo').value.trim().toUpperCase();
  const desconto = parseInt(document.getElementById('input-desconto').value);
  
  if (!codigo || !desconto) {
    alert('Preencha os campos');
    return;
  }
  
  try {
    await db.collection('PROMOCOES').add({
      code: codigo,
      discount: desconto,
      active: true,
      createdAt: new Date()
    });
    document.getElementById('input-codigo').value = '';
    document.getElementById('input-desconto').value = '';
    fecharModal('modal-cupom');
    carregarCupons();
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

async function toggleCupom(id, ativo) {
  await db.collection('PROMOCOES').doc(id).update({active: ativo});
  carregarCupons();
}

async function deletarCupom(id) {
  if (!confirm('Deletar?')) return;
  await db.collection('PROMOCOES').doc(id).delete();
  carregarCupons();
}

function calcularValor() {
  const servico = document.getElementById('select-servico').value;
  const laudas = parseInt(document.getElementById('input-laudas').value) || 0;
  
  if (!servico) {
    document.getElementById('valor-base').textContent = 'R$ 0';
    document.getElementById('valor-total').textContent = 'R$ 0';
    return;
  }
  
  let valorBase = TIPO_FIXO[servico] ? PRECOS[servico] : (laudas > 0 ? PRECOS[servico] * laudas : 0);
  let valorFinal = valorBase;
  
  if (cupomAplicado) {
    const desconto = valorBase * (cupomAplicado.discount / 100);
    valorFinal = valorBase - desconto;
    document.getElementById('desconto-display').style.display = 'flex';
    document.getElementById('valor-desconto').textContent = '- R$ ' + desconto.toFixed(2);
  } else {
    document.getElementById('desconto-display').style.display = 'none';
  }
  
  document.getElementById('valor-base').textContent = 'R$ ' + valorBase.toFixed(2);
  document.getElementById('valor-total').textContent = 'R$ ' + valorFinal.toFixed(2);
}

async function aplicarCupom() {
  const codigo = document.getElementById('input-cupom').value.trim().toUpperCase();
  const msg = document.getElementById('cupom-msg');
  
  if (!codigo) {
    cupomAplicado = null;
    msg.textContent = '';
    calcularValor();
    return;
  }
  
  const snap = await db.collection('PROMOCOES').where('code', '==', codigo).limit(1).get();
  
  if (snap.empty || !snap.docs[0].data().active) {
    msg.textContent = 'Inválido';
    cupomAplicado = null;
    calcularValor();
    return;
  }
  
  cupomAplicado = snap.docs[0].data();
  msg.textContent = '✅ ' + codigo;
  calcularValor();
}

function abrirModalPagamento() {
  const servico = document.getElementById('select-servico').value;
  const tema = document.getElementById('input-tema').value;
  
  if (!servico || !tema) {
    alert('Preecha campos');
    return;
  }
  
  const valorBase = parseFloat(document.getElementById('valor-base').textContent.replace('R$ ', ''));
  const valorTotal = parseFloat(document.getElementById('valor-total').textContent.replace('R$ ', ''));
  
  pendingOrder = {
    servico: servico,
    laudas: parseInt(document.getElementById('input-laudas').value) || 0,
    tema: tema,
    desc: document.getElementById('input-desc').value,
    valor: valorTotal,
    valorCheio: valorBase,
    descontoValor: valorBase - valorTotal,
    descontoPct: cupomAplicado ? cupomAplicado.discount : 0
  };
  
  document.getElementById('resumo-servico').textContent = servico + (pendingOrder.laudas ? ' — ' + pendingOrder.laudas + ' laudas' : '');
  document.getElementById('resumo-tema').textContent = tema;
  document.getElementById('resumo-total').textContent = 'R$ ' + valorTotal.toFixed(2);
  document.getElementById('modal-pagamento').classList.remove('hidden');
}

async function processarPagamento() {
  const metodo = document.querySelector('input[name="metodo-pag"]:checked').value;
  const btn = document.getElementById('btn-pagar');
  btn.disabled = true;
  
  try {
    if (metodo === 'teste') {
      await salvarPedido('em_andamento', true);
      alert('✅ Pedido de teste criado');
      fecharModal('modal-pagamento');
      showPanel('cliente-meus');
      carregarMeusPedidos();
    } else {
      const idToken = await auth.currentUser.getIdToken();
      const resp = await fetch('/api/criar-preferencia', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + idToken
        },
        body: JSON.stringify({
          tipo_servico: pendingOrder.servico,
          laudas: pendingOrder.laudas,
          valor: pendingOrder.valor,
          tema: pendingOrder.tema
        })
      });
      
      const data = await resp.json();
      if (data.init_point) {
        await salvarPedido('aguardando_pagamento', false);
        window.open(data.init_point, '_blank');
        fecharModal('modal-pagamento');
      } else {
        alert('Erro: ' + data.error);
      }
    }
  } catch (e) {
    alert('Erro: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function salvarPedido(status, isTeste) {
  await db.collection('orders').add({
    clientId: currentUser.uid,
    clientEmail: currentUser.email,
    clientName: currentUser.displayName || currentUser.email,
    servico: pendingOrder.servico,
    laudas: pendingOrder.laudas,
    tema: pendingOrder.tema,
    desc: pendingOrder.desc,
    valor: pendingOrder.valor,
    valorCheio: pendingOrder.valorCheio,
    descontoValor: pendingOrder.descontoValor,
    descontoPct: pendingOrder.descontoPct,
    isTeste: isTeste,
    status: status,
    pagamento: isTeste ? 'teste' : 'cartao',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  pendingOrder = null;
}

async function carregarMeusPedidos() {
  const snap = await db.collection('orders').where('clientId', '==', currentUser.uid).orderBy('createdAt', 'desc').get();
  let html = '';
  snap.forEach(doc => {
    const d = doc.data();
    html += `<div class="pedido-item"><strong>${d.servico}</strong> ${d.laudas ? '— ' + d.laudas + ' laudas' : ''}<div style="font-size: 11px; color: #94a3b8; margin-top: 5px;">R$ ${d.valor.toFixed(2)} | ${d.status} | #${doc.id.substring(0, 8).toUpperCase()}</div></div>`;
  });
  document.getElementById('meus-pedidos-lista').innerHTML = html || '<p>-</p>';
}

function fecharModal(id) {
  document.getElementById(id).classList.add('hidden');
}

function logout() {
  auth.signOut().then(() => window.location.href = '/');
}
</script>

</body>
</html>
